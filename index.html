<div class="box" style="width: 60%; margin: 40px auto;">
  <div style="text-align: center;">
    <h1 style="color: #f0d97a; font-weight: 550;">Fare-ly Transits - Metro Manila</h1>
    <br>
    <h5 style="color: #a8d8ea;">MRT Line 3</h5>
    <span style="color: #ccc;">(North Avenue-Taft Avenue)</span>
    <br><br>
    <img src="Screenshot 2026-03-16 170034.png" style="height: 390px; width: 698px; border-radius: 10px;">
  </div>
</div>

<br><br>

<div class="container mt-4" style="padding-bottom: 200px;" id="fareMatrix">
  <div class="box">
    <div class="row justify-content-center">
      <div class="col-md-6">

        <h4 class="text-center mb-4" style="color:#f0d97a; font-weight: 400 !important;">Fare Matrix</h4>

        <div class="mb-3">
          <label for="pickup">Pick-up station:</label>
          <select id="pickup" class="form-select mt-1">
            <option value="">-- Select a station --</option>
            <option value="0">North Avenue</option>
            <option value="1">Quezon Avenue</option>
            <option value="2">Kamuning</option>
            <option value="3">Araneta Center-Cubao</option>
            <option value="4">Santolan-Annapolis</option>
            <option value="5">Ortigas</option>
            <option value="6">Shaw Boulevard</option>
            <option value="7">Boni</option>
            <option value="8">Guadalupe</option>
            <option value="9">Buendia</option>
            <option value="10">Ayala</option>
            <option value="11">Magallanes</option>
            <option value="12">Taft Avenue</option>
          </select>
        </div>

        <div class="mb-3">
          <label for="dropoff">Drop-off station:</label>
          <select id="dropoff" class="form-select mt-1">
            <option value="">-- Select a station --</option>
            <option value="0">North Avenue</option>
            <option value="1">Quezon Avenue</option>
            <option value="2">Kamuning</option>
            <option value="3">Araneta Center-Cubao</option>
            <option value="4">Santolan-Annapolis</option>
            <option value="5">Ortigas</option>
            <option value="6">Shaw Boulevard</option>
            <option value="7">Boni</option>
            <option value="8">Guadalupe</option>
            <option value="9">Buendia</option>
            <option value="10">Ayala</option>
            <option value="11">Magallanes</option>
            <option value="12">Taft Avenue</option>
          </select>
        </div>

        <div class="d-flex gap-2 mb-4">
          <button type="button" style="border: 1px solid rgba(255,255,255,0.4); color: white;" class="btn w-50" onclick="computeFare('regular')">Regular Fare</button>
          <button type="button" style="border: 1px solid rgba(255,255,255,0.4); color: white;" class="btn w-50" onclick="computeFare('discounted')">Discounted Fare</button>
        </div>

        <div class="fare-box" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 15px;">
          <p id="distanceResult" style="color:#a8d8ea; margin-bottom: 5px;"></p>
          <div id="fareResult" style="font-size: 28px; font-weight: 700; color: #f0d97a;">—</div>
          <p id="fareNote" style="color:#ccc; font-size:14px; margin-top:8px;"></p>
        </div>

      </div>
    </div>
  </div>
</div>

<br>
<footer>
  <p style="color: #ccc;">Guia Suarez | 9 - Ruby ©2026</p>
</footer>

<script>
    var stationDistances = [0, 1.2, 2.3, 4.0, 5.2, 7.1, 8.0, 9.1, 10.5, 12.0, 13.1, 14.3, 16.0];
    var baseFare = 50;
    var perKMrate = 15;
    var baseKM = 2;

    function computeFare(type) {
      var pickup = parseInt(document.getElementById("pickup").value);
      var dropoff = parseInt(document.getElementById("dropoff").value);

      if (isNaN(pickup) || isNaN(dropoff)) {
        alert("Please select both stations.");
        return;
      }

      if (pickup === dropoff) {
        alert("Pick-up and drop-off stations cannot be the same.");
        return;
      }

      var distance = Math.abs(stationDistances[pickup] - stationDistances[dropoff]);
      distance = Math.round(distance * 10) / 10;

      var fare;
      if (distance <= baseKM) {
        fare = baseFare;
      } else {
        var extraKM = distance - baseKM;
        fare = baseFare + (extraKM * perKMrate);
      }

      if (type === "discounted") {
        fare = fare * 0.80;
      }

      fare = Math.round(fare * 100) / 100;

      document.getElementById("distanceResult").innerText = "Distance: " + distance + " km";
      document.getElementById("fareResult").innerHTML = "&#8369; " + fare.toFixed(2);

      if (type === "discounted") {
        document.getElementById("fareNote").innerText = "Discounted Rate (20% off for Senior/PWD/student)";
      } else {
        document.getElementById("fareNote").innerText = "Regular Rate";
      }
    }
</script>
