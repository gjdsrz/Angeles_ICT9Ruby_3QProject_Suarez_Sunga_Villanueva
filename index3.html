<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Confirmation Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
        background-color: #3b4671;
        background-image: url(blue.png);
        font-family: 'Poppins', Arial, sans-serif;
        margin: 0;
        padding: 0;
    }

    .navbar-brand {
        font-weight: 700;
    }

    .confirm-box {
        background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(100,160,200,0.25));
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 15px;
        width: 500px;
        margin: 80px auto;
        padding: 50px 40px;
        color: white;
        text-align: center;
    }

    .confirm-box h1 {
        color: #f0d97a;
        font-weight: 550;
        font-size: 1.8rem;
        margin-bottom: 15px;
    }

    .confirm-box p {
        color: #ccc;
        font-size: 15px;
        margin-bottom: 25px;
    }

    .verify-btn {
        background-color: #a8d8ea;
        border: none;
        padding: 10px 30px;
        border-radius: 8px;
        color: #1a232a;
        font-family: 'Poppins', Arial, sans-serif;
        font-size: 15px;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
    }

    .verify-btn:hover {
        background-color: #8ec8dc;
        color: #1a232a;
    }

    footer {
        background: #1a232a;
        text-align: center;
        padding: 10px;
        color: #ccc;
        position: fixed;
        bottom: 0;
        width: 100%;
    }
  </style>
</head>
<body>

<header>
<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #212529; width: 100vw; margin: 0; padding: 10px 15px;">
    <a class="navbar-brand" href="index.html"><img src="train.png" alt="logo" height="50px" width="50px"></a>
    <ul class="navbar-nav me-auto d-flex flex-row gap-3">
        <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link active" href="index.html#fareMatrix">Fare Matrix</a></li>
        <li class="nav-item"><a class="nav-link active" href="#">Schedule</a></li>
        <li class="nav-item"><a class="nav-link active" href="#">Help</a></li>
    </ul>
    <div class="d-flex ms-auto gap-2">
        <button style="color: #aaa;" class="btn" type="button" onclick="window.location.href='index2.html'"><u>Book now</u></button>
        <button class="btn btn-light" type="button" onclick="window.location.href='index2.html'">Create Account</button>
    </div>
</nav>
</header>

<div class="confirm-box">
    <h1>Your account has been created.</h1>
    <p>↓ Click here to verify your email.</p>
    <a href="index.html" class="verify-btn">Verify your email</a>
</div>

<footer>
    <p style="margin: 0;">Kaleb Villanueva | 9 Ruby ©2026</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
